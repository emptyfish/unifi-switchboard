<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>UniFi Switchboard</title>
  <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e14;
      --surface: #111820;
      --surface2: #162030;
      --border: #1e2d3d;
      --accent: #00d4ff;
      --accent-dim: rgba(0,212,255,0.10);
      --green: #a6e3a1;
      --green-dim: rgba(166,227,161,0.12);
      --red: #f38ba8;
      --red-dim: rgba(243,139,168,0.12);
      --yellow: #f9e2af;
      --text: #cdd6f4;
      --muted: #6b7fa3;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 30% at 50% 0%, rgba(0,212,255,0.05) 0%, transparent 70%);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,14,20,0.92);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .brand {
      font-family: var(--display);
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .brand span {
      font-weight: 700;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      margin-left: 0.75rem;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    #status-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.error { background: var(--red); }

    .logout {
      font-size: 0.7rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .logout:hover { color: var(--text); }

    .debug-menu {
      position: relative;
    }

    .debug-toggle {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
      user-select: none;
    }
    .debug-toggle:hover { color: var(--text); }

    .debug-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 0.5rem);
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      min-width: 160px;
      z-index: 20;
    }
    .debug-menu.open .debug-dropdown { display: block; }

    .debug-dropdown a {
      display: block;
      padding: 0.55rem 0.9rem;
      font-size: 0.68rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: background 0.15s, color 0.15s;
    }
    .debug-dropdown a:hover { background: var(--surface); color: var(--text); }
    .debug-dropdown a + a { border-top: 1px solid var(--border); }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .section-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    #rules-container {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .rule-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      transition: border-color 0.2s, background 0.2s;
      animation: fadeIn 0.3s ease both;
    }

    .rule-card:hover {
      border-color: #2a3f57;
      background: var(--surface2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rule-info { flex: 1; min-width: 0; }

    .rule-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.2rem;
    }

    .rule-meta {
      font-size: 0.68rem;
      color: var(--muted);
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .rule-position {
      font-size: 0.58rem;
      color: #3a4f66;
      letter-spacing: 0.06em;
      font-family: var(--mono);
    }

    .zone-group-header {
      font-size: 0.63rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.5rem 0 0.4rem;
      border-bottom: 1px solid var(--border);
      margin-top: 1.25rem;
    }
    .zone-group-header:first-child { margin-top: 0; }

    .badge {
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .badge-block { background: var(--red-dim); color: var(--red); }
    .badge-allow { background: var(--green-dim); color: var(--green); }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .toggle-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      width: 3rem;
      text-align: right;
      transition: color 0.2s;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.25s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 4px;
      top: 4px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }

    .toggle input:checked + .slider {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
    }

    .toggle input:checked + .slider::before {
      transform: translateX(20px);
      background: var(--accent);
    }

    .toggle.loading .slider { opacity: 0.5; pointer-events: none; }

    .rule-card.updating {
      opacity: 0.6;
      pointer-events: none;
    }

    .rule-card[data-tooltip] {
      position: relative;
    }

    .rule-card[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a2535;
      color: var(--text);
      font-size: 0.7rem;
      line-height: 1.4;
      padding: 0.4rem 0.65rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      white-space: normal;
      max-width: 280px;
      width: max-content;
      text-align: left;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }

    .rule-card[data-tooltip]:hover::after {
      opacity: 1;
    }

    /* Skeleton loader */
    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      height: 62px;
      position: relative;
      overflow: hidden;
    }
    .skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }

    .error-msg {
      background: var(--red-dim);
      border: 1px solid rgba(243,139,168,0.25);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      color: var(--red);
      font-size: 0.8rem;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem 1.1rem;
      font-size: 0.78rem;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: rgba(166,227,161,0.3); color: var(--green); }
    .toast.fail    { border-color: rgba(243,139,168,0.3); color: var(--red); }

    /* Debug modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 100%;
      max-width: 860px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .modal-actions { display: flex; gap: 0.5rem; }

    .modal-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .modal-btn:hover { color: var(--text); border-color: #2a3f57; }
    .modal-btn.copied { color: var(--green); border-color: rgba(166,227,161,0.4); }

    .modal-body {
      overflow: auto;
      padding: 1rem 1.1rem;
      margin: 0;
      font-size: 0.75rem;
      line-height: 1.6;
      tab-size: 2;
      flex: 1;
    }

    .modal-loading {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    .json-key  { color: var(--accent); }
    .json-str  { color: var(--green); }
    .json-num  { color: var(--yellow); }
    .json-bool { color: #cba6f7; }
    .json-null { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div>
      <span class="brand">Switchboard<span>UniFi Zone Policies</span></span>
    </div>
    <div class="header-right">
      <div id="status-indicator">
        <div class="dot" id="dot"></div>
        <span id="status-text">Connecting…</span>
      </div>
      <div class="debug-menu" id="debugMenu">
        <span class="debug-toggle" id="debugToggle">Debug</span>
        <div class="debug-dropdown">
          <a data-debug="/api/rules">Processed Rules</a>
          <a data-debug="/api/debug/raw-policies">Raw Policies</a>
          <a data-debug="/api/debug/zones">Zones / Networks</a>
          <a data-debug="/api/debug/policy-ordering">Policy Ordering</a>
        </div>
      </div>
      <a href="/logout" class="logout">Logout</a>
    </div>
  </header>

  <main>
    <div class="section-label">Traffic Rules</div>
    <div id="rules-container">
      <div class="skeleton"></div>
      <div class="skeleton" style="animation-delay:.07s"></div>
      <div class="skeleton" style="animation-delay:.14s"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="debugModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle"></span>
        <div class="modal-actions">
          <button class="modal-btn" id="copyBtn">Copy</button>
          <button class="modal-btn" id="modalClose">Close</button>
        </div>
      </div>
      <pre class="modal-body" id="modalBody"></pre>
    </div>
  </div>

  <script>
    const container = document.getElementById('rules-container');
    const dot = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const toast = document.getElementById('toast');
    let toastTimer;

    const debugMenu = document.getElementById('debugMenu');
    document.getElementById('debugToggle').addEventListener('click', e => {
      debugMenu.classList.toggle('open');
      e.stopPropagation();
    });
    document.addEventListener('click', () => debugMenu.classList.remove('open'));

    // Debug modal
    const debugModal = document.getElementById('debugModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody  = document.getElementById('modalBody');
    const copyBtn    = document.getElementById('copyBtn');
    let   rawJson    = '';

    function jsonHighlight(str) {
      return str.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g,
        m => {
          if (/^"/.test(m)) return `<span class="${/:$/.test(m) ? 'json-key' : 'json-str'}">${m}</span>`;
          if (/true|false/.test(m)) return `<span class="json-bool">${m}</span>`;
          if (/null/.test(m))       return `<span class="json-null">${m}</span>`;
          return `<span class="json-num">${m}</span>`;
        }
      );
    }

    document.querySelectorAll('[data-debug]').forEach(el => {
      el.addEventListener('click', async e => {
        e.stopPropagation();
        debugMenu.classList.remove('open');
        const endpoint = el.dataset.debug;
        modalTitle.textContent = endpoint;
        modalBody.innerHTML = '<div class="modal-loading">Loading…</div>';
        rawJson = '';
        copyBtn.textContent = 'Copy';
        copyBtn.classList.remove('copied');
        debugModal.classList.add('open');
        try {
          const res = await fetch(endpoint);
          if (res.status === 401) { window.location.href = '/login'; return; }
          const data = await res.json();
          rawJson = JSON.stringify(data, null, 2);
          modalBody.innerHTML = jsonHighlight(rawJson.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));
        } catch (err) {
          modalBody.textContent = `Error: ${err.message}`;
        }
      });
    });

    document.getElementById('modalClose').addEventListener('click', () => debugModal.classList.remove('open'));
    debugModal.addEventListener('click', e => { if (e.target === debugModal) debugModal.classList.remove('open'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') debugModal.classList.remove('open'); });

    copyBtn.addEventListener('click', () => {
      if (!rawJson) return;
      navigator.clipboard.writeText(rawJson).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
      });
    });

    function showToast(msg, type = 'success') {
      clearTimeout(toastTimer);
      toast.textContent = msg;
      toast.className = `toast show ${type}`;
      toastTimer = setTimeout(() => toast.className = 'toast', 2800);
    }

    function setStatus(connected, msg) {
      dot.className = `dot ${connected ? 'connected' : 'error'}`;
      statusText.textContent = msg;
    }

    function buildRuleCard(rule, position, animIdx) {
      const isBlock = rule.action.toLowerCase().includes('block');

      const name = document.createElement('div');
      name.className = 'rule-name';
      name.textContent = rule.description;

      const badge = document.createElement('span');
      badge.className = `badge ${isBlock ? 'badge-block' : 'badge-allow'}`;
      badge.textContent = isBlock ? 'Block' : 'Allow';

      const sched = document.createElement('span');
      sched.textContent = rule.schedule === 'always' ? 'Always active' : rule.schedule;

      const pos = document.createElement('span');
      pos.className = 'rule-position';
      pos.textContent = `#${position}`;

      const meta = document.createElement('div');
      meta.className = 'rule-meta';
      meta.appendChild(badge);
      meta.appendChild(sched);
      meta.appendChild(pos);

      const info = document.createElement('div');
      info.className = 'rule-info';
      info.appendChild(name);
      info.appendChild(meta);

      const lbl = document.createElement('span');
      lbl.className = 'toggle-label';
      lbl.id = `lbl-${rule.id}`;
      lbl.textContent = rule.enabled ? 'On' : 'Off';

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = rule.enabled;
      checkbox.addEventListener('change', () => toggle(rule.id, checkbox));

      const slider = document.createElement('span');
      slider.className = 'slider';

      const togLabel = document.createElement('label');
      togLabel.className = 'toggle';
      togLabel.id = `tog-${rule.id}`;
      togLabel.appendChild(checkbox);
      togLabel.appendChild(slider);

      const wrap = document.createElement('div');
      wrap.className = 'toggle-wrap';
      wrap.appendChild(lbl);
      wrap.appendChild(togLabel);

      const card = document.createElement('div');
      card.className = 'rule-card';
      card.style.animationDelay = `${animIdx * 0.05}s`;
      card.dataset.id = rule.id;
      if (rule.tooltip) card.dataset.tooltip = rule.tooltip;
      card.appendChild(info);
      card.appendChild(wrap);
      return card;
    }

    async function loadRules() {
      try {
        const res = await fetch('/api/rules');
        if (res.status === 401) { window.location.href = '/login'; return; }
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);

        setStatus(true, 'Connected');
        container.innerHTML = '';

        let animIdx = 0;
        data.groups.forEach(group => {
          const header = document.createElement('div');
          header.className = 'zone-group-header';
          header.textContent = group.label;
          container.appendChild(header);

          group.rules.forEach((rule, pos) => {
            container.appendChild(buildRuleCard(rule, pos + 1, animIdx));
            animIdx++;
          });
        });
      } catch (e) {
        setStatus(false, 'Error');
        const errEl = document.createElement('div');
        errEl.className = 'error-msg';
        errEl.textContent = `Failed to load rules: ${e.message}`;
        container.innerHTML = '';
        container.appendChild(errEl);
      }
    }

    async function toggle(ruleId, checkbox) {
      const card = checkbox.closest('.rule-card');
      const lbl = document.getElementById(`lbl-${ruleId}`);
      const enabled = checkbox.checked;

      card.classList.add('updating');

      try {
        const res = await fetch(`/api/rules/${ruleId}/toggle`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled }),
        });
        if (res.status === 401) { window.location.href = '/login'; return; }
        const data = await res.json();
        if (!data.ok) throw new Error(data.error);

        lbl.textContent = enabled ? 'On' : 'Off';
        showToast(`Rule ${enabled ? 'enabled' : 'disabled'}`, 'success');
      } catch (e) {
        checkbox.checked = !enabled; // revert
        lbl.textContent = !enabled ? 'On' : 'Off';
        showToast(`Failed: ${e.message}`, 'fail');
      } finally {
        card.classList.remove('updating');
      }
    }

    loadRules();
  </script>
</body>
</html>
