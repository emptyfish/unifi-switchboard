<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e14;
      --surface: #111820;
      --border: #1e2d3d;
      --accent: #00d4ff;
      --accent-dim: rgba(0,212,255,0.12);
      --text: #cdd6f4;
      --muted: #6b7fa3;
      --error: #f38ba8;
      --mono: 'JetBrains Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,212,255,0.06) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,45,61,0.4) 39px, rgba(30,45,61,0.4) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,45,61,0.4) 39px, rgba(30,45,61,0.4) 40px);
    }

    .card {
      width: 100%;
      max-width: 360px;
      padding: 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(0,212,255,0.04);
    }

    .brand {
      font-family: var(--display);
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .sub {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.25rem;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    button {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 3px;
      padding: 0.75rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .error {
      background: rgba(243,139,168,0.1);
      border: 1px solid rgba(243,139,168,0.3);
      border-radius: 3px;
      padding: 0.6rem 0.9rem;
      font-size: 0.78rem;
      color: var(--error);
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Switchboard</div>
    <div class="sub">UniFi Firewall Manager</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <label for="password">Access Key</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password">
      <button type="submit">Authenticate →</button>
    </form>
  </div>
</body>
</html>
