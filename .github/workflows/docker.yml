name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  sync-template:
    runs-on: ubuntu-latest
    if: contains(toJson(github.event.commits.*.modified), 'unraid.xml') || contains(toJson(github.event.commits.*.added), 'unraid.xml')
    steps:
      - uses: actions/checkout@v4

      - name: Sync unraid.xml to unraid-apps repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:${GH_PAT}@github.com/emptyfish/unraid-apps.git target
          mkdir -p target/unifi-switchboard
          cp unraid.xml target/unifi-switchboard/unraid.xml
          cd target
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add unifi-switchboard/unraid.xml
          git diff --cached --quiet || git commit -m "Sync unifi-switchboard/unraid.xml from unifi-switchboard"
          git push

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/unifi-switchboard:latest
            ghcr.io/${{ github.repository_owner }}/unifi-switchboard:${{ github.sha }}
