name: Sync Unraid Template

on:
  push:
    branches: [main]
    paths:
      - unraid.xml

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync unraid.xml to unraid-apps repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:${GH_PAT}@github.com/emptyfish/unraid-apps.git target
          mkdir -p target/unifi-switchboard
          cp unraid.xml target/unifi-switchboard/unraid.xml
          cd target
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add unifi-switchboard/unraid.xml
          git diff --cached --quiet || git commit -m "Sync unifi-switchboard/unraid.xml from unifi-switchboard"
          git push
